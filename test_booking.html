<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOTEL DEOMALI | Book</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <section id="booking">
        <h2>Book Your Room</h2>
        <!-- Step 1 -->
        <div id="step-dates">
            <input type="date" id="checkin">
            <input type="date" id="checkout">
            <button id="findRoomsBtn">Check Availability</button>
        </div>
        <div id="status"></div>
    </section>

    <script>
        console.log("Script loaded.");
        
        // Safely initialize Supabase
        window.supabaseClient = window.supabaseClient || supabase.createClient(
            'https://tuyxkirgobnvacmjilsz.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1eXhraXJnb2JudmFjbWppbHN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzQ5MDgsImV4cCI6MjA4ODgxMDkwOH0.2WU369DWbHlcRhPtF4X8jWT4cQw2mGP8JPb0KVlNNq4'
        );
        const mySupabase = window.supabaseClient;

        document.getElementById('findRoomsBtn').onclick = async () => {
            console.log("Button clicked!");
            try {
                const { data, error } = await mySupabase.from('rooms').select('*');
                if (error) {
                    console.error("Supabase Error:", error);
                    document.getElementById('status').innerText = "DB Error: " + error.message;
                } else {
                    console.log("Data found:", data);
                    document.getElementById('status').innerText = "Successfully connected! Found " + data.length + " rooms.";
                }
            } catch (e) {
                console.error("Fetch Error:", e);
                document.getElementById('status').innerText = "Catch Error: " + e.message;
            }
        };
    </script>
</body>
</html>
