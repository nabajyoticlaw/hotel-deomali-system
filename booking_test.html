<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HOTEL DEOMALI | Book</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .step { display: none; }
        .step.active { display: block; }
        .room-card { padding: 10px; margin: 5px; border: 1px solid #ccc; cursor: pointer; }
        .room-card.selected { background: #d1e7dd; }
    </style>
</head>
<body>
    <section id="booking">
        <h2>Book Your Room</h2>
        <!-- Step 1 -->
        <div id="step-1" class="step active">
            <input type="date" id="checkin">
            <input type="date" id="checkout">
            <button id="findRoomsBtn">Check Availability</button>
        </div>
        <!-- Step 2 -->
        <div id="step-2" class="step">
            <h3>Select Room:</h3>
            <div id="rooms-list"></div>
            <button onclick="changeStep(1)">Back</button>
            <button onclick="changeStep(3)">Next</button>
        </div>
        <!-- Step 3 -->
        <div id="step-3" class="step">
            <input type="text" id="name" placeholder="Name">
            <button onclick="changeStep(2)">Back</button>
            <button id="confirmBtn">Confirm</button>
        </div>
    </section>

    <script>
        // Use a unique variable name to avoid global redeclaration
        window.mySupabaseClient = window.mySupabaseClient || supabase.createClient('https://tuyxkirgobnvacmjilsz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1eXhraXJnb2JudmFjbWppbHN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzQ5MDgsImV4cCI6MjA4ODgxMDkwOH0.2WU369DWbHlcRhPtF4X8jWT4cQw2mGP8JPb0KVlNNq4');
        const mySupabase = window.mySupabaseClient;

        function changeStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step-' + n).classList.add('active');
        }

        document.getElementById('findRoomsBtn').onclick = async () => {
            console.log("Button clicked!");
            try {
                const start = document.getElementById('checkin').value;
                const end = document.getElementById('checkout').value;
                
                // Get all rooms
                const { data: allRooms, error: roomError } = await mySupabase.from('rooms').select('*');
                if (roomError) throw roomError;
                
                // Get bookings overlapping with selected dates
                const { data: bookings, error: bookingError } = await mySupabase.from('bookings')
                    .select('room_id')
                    .or(`and(check_in.lte.${end},check_out.gte.${start})`);
                if (bookingError) throw bookingError;
                
                const bookedRoomIds = bookings.map(b => b.room_id);
                
                document.getElementById('rooms-list').innerHTML = '';
                allRooms.forEach(room => {
                    if (!bookedRoomIds.includes(room.id)) {
                        const div = document.createElement('div');
                        div.className = 'room-card';
                        div.innerText = `Room ${room.id} (${room.type})`;
                        div.onclick = () => { div.classList.toggle('selected'); /* logic to track selected rooms */ };
                        document.getElementById('rooms-list').appendChild(div);
                    }
                });
                changeStep(2);
            } catch (e) {
                console.error("Error:", e);
                alert("Error: " + e.message);
            }
        };
    </script>
</body>
</html>
